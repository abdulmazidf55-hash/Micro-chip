<!-- ================= USER SITE (index.html) ================= --><!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Micro Chips Exhibitor</title>
<style>
body{background:#05070d;color:#fff;font-family:Arial;text-align:center}
.container{display:flex;flex-wrap:wrap;justify-content:center}
.card{padding:15px;margin:10px;background:#111;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<h1>Micro Chips Exhibitor</h1>
<div class="container" id="chips"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyA8vpy4CrqrWC7v2--EXy5SXCWhAM9QkRM",
authDomain:"micro-chip-2f2b9.firebaseapp.com",
projectId:"micro-chip-2f2b9",
storageBucket:"micro-chip-2f2b9.firebasestorage.app",
messagingSenderId:"636898644853",
appId:"1:636898644853:web:1ad4170cf54d78998cb93c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chipsDiv = document.getElementById("chips");

onValue(ref(db, "chips"), (snapshot)=>{
chipsDiv.innerHTML="";
const data=snapshot.val();
for(let id in data){
let chip=data[id];
let div=document.createElement("div");
div.className="card";
div.innerHTML=`Chip ${id}<br>${chip.status}`;
div.onclick=()=>alert(`Model: ${chip.model}\nStatus: ${chip.status}\nMode: ${chip.mode}`);
chipsDiv.appendChild(div);
}
});
</script></body>
</html>
